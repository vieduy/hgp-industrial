# Local one-command run of the production image (API + built SPA in one container).
#   docker compose up --build   → http://localhost:8080
services:
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # LLM assistant (Google Gemini). Override LLM_API_KEY in your shell / .env
      # to avoid committing secrets; these defaults match the dev key.
      - LLM_BASE_URL=${LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      - LLM_MODEL=${LLM_MODEL:-gemma-4-31b-it}
      - LLM_API_KEY=${LLM_API_KEY:-AIzaSyA2yJWoTlmYXjGOen_tnL4Js7FIyLEkZnA}
    restart: unless-stopped
